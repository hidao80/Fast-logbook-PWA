name: Audit

on:
  push:
    branches: [main, develop]

jobs:
  audit:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v5
      - uses: flatt-security/setup-takumi-guard-npm@v1
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm audit --audit-level=high
